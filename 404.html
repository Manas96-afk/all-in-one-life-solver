<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Life Solver</title>
    <meta name="description" content="The page you're looking for doesn't exist. Explore our AI tools, life hacks, and guides to solve your daily problems.">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            padding: 20px;
        }
        
        .error-content {
            text-align: center;
            max-width: 500px;
            background: var(--white);
            padding: 60px 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
        }
        
        .error-icon {
            font-size: 80px;
            color: var(--sky-blue);
            margin-bottom: 30px;
        }
        
        .error-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        
        .error-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        
        .btn-secondary {
            color: var(--sky-blue);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .btn-secondary:hover {
            color: var(--dark-blue);
        }
        
        .suggestions {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e2e8f0;
        }
        
        .suggestions h3 {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        
        .suggestions ul {
            list-style: none;
            padding: 0;
        }
        
        .suggestions li {
            margin-bottom: 8px;
        }
        
        .suggestions a {
            color: var(--sky-blue);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .suggestions a:hover {
            color: var(--dark-blue);
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .error-content {
                padding: 40px 24px;
            }
            
            .error-title {
                font-size: 2rem;
            }
            
            .error-icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-icon">
                <i class="fas fa-search"></i>
            </div>
            
            <h1 class="error-title">Page Not Found</h1>
            
            <p class="error-message">
                Oops! The page you're looking for doesn't exist. But don't worry, we have plenty of helpful tools and guides to solve your daily problems.
            </p>
            
            <div class="error-actions">
                <a href="pages/(home)index.html" class="btn-primary">
                    <i class="fas fa-home"></i>
                    Back to Home
                </a>
                
                <a href="pages/category.html" class="btn-secondary">
                    Browse Categories
                </a>
            </div>
            
            <div class="suggestions">
                <h3>Popular Sections:</h3>
                <ul>
                    <li><a href="pages/category.html?type=ai-tool">🤖 AI Tools</a></li>
                    <li><a href="pages/category.html?type=life-hack">💡 Life Hacks</a></li>
                    <li><a href="pages/category.html?type=guide">📚 Guides</a></li>
                    <li><a href="pages/category.html?category=study">🎓 Study Tips</a></li>
                    <li><a href="pages/category.html?category=productivity">⚡ Productivity</a></li>
                </ul>
            </div>
        </div>
    </div>
    
    <!-- Chatbot -->
    <link rel="stylesheet" href="css/chatbot.css">
    <script src="js/chatbot.js"></script>
</body>
</html>
