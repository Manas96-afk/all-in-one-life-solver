<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Lightbulb -->
  <g transform="translate(50,50)">
    <!-- Bulb -->
    <ellipse cx="0" cy="-8" rx="12" ry="16" fill="#ffffff" opacity="0.9"/>
    
    <!-- Filament -->
    <path d="M-6,-12 Q0,-8 6,-12" stroke="#0ea5e9" stroke-width="1.5" fill="none"/>
    <path d="M-4,-6 Q0,-4 4,-6" stroke="#0ea5e9" stroke-width="1.5" fill="none"/>
    
    <!-- Base -->
    <rect x="-8" y="8" width="16" height="4" fill="#ffffff" opacity="0.9" rx="2"/>
    <rect x="-6" y="12" width="12" height="2" fill="#ffffff" opacity="0.7" rx="1"/>
    <rect x="-6" y="14" width="12" height="2" fill="#ffffff" opacity="0.7" rx="1"/>
    
    <!-- Shine effect -->
    <ellipse cx="-4" cy="-12" rx="3" ry="6" fill="#ffffff" opacity="0.3"/>
  </g>
</svg>