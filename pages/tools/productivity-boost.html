<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Boost - Focus Tasks | Life Solver</title>
    <meta name="description" content="Get instant productivity tips and focus tasks. Beat procrastination and get things done.">
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/brand-components.css">
    <link rel="stylesheet" href="../../css/mini-tool.css">
    <link rel="stylesheet" href="../../css/notifications.css">
</head>
<body>
    <nav class="ls-navbar">
        <div class="ls-container">
            <a href="../../index.html" class="ls-nav-logo"><span>💡</span><span>Life Solver</span></a>
            <div class="ls-nav-links">
                <a href="../../index.html">Home</a>
                <a href="../ai-tools.html">Tools</a>
                <a href="../guides-library.html">Guides</a>
                <a href="../dashboard.html">Dashboard</a>
            </div>
            <button class="ls-mobile-menu" onclick="toggleMobileMenu()">☰</button>
        </div>
    </nav>

    <div class="tool-container">
        <div class="tool-header">
            <span class="tool-icon">⚡</span>
            <h1>Productivity Boost</h1>
            <p>Get small tasks to boost your focus and beat procrastination</p>
        </div>

        <div class="tool-card">
            <div class="form-group">
                <label>What's your situation?</label>
                <div class="quick-options">
                    <button class="quick-option" onclick="setSituation('procrastinating')">Can't start</button>
                    <button class="quick-option" onclick="setSituation('overwhelmed')">Overwhelmed</button>
                    <button class="quick-option" onclick="setSituation('distracted')">Distracted</button>
                    <button class="quick-option" onclick="setSituation('low energy')">Low energy</button>
                    <button class="quick-option" onclick="setSituation('need motivation')">Need motivation</button>
                </div>
            </div>

            <div class="form-group">
                <label>What do you need to work on? (optional)</label>
                <input type="text" id="taskInput" placeholder="E.g., report, studying, cleaning, project...">
            </div>

            <button class="submit-btn" id="submitBtn" onclick="getBoost()">
                <span id="btnText">⚡ Boost My Productivity</span>
                <div class="spinner" id="spinner" style="display: none;"></div>
            </button>
            <div class="error-message" id="errorMsg"></div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-card" style="border-left-color: #ed8936;">
                <div class="result-header">
                    <h3>🚀 Your Productivity Boost</h3>
                    <div class="result-actions">
                        <button class="action-btn" onclick="copyResult()">📋 Copy</button>
                        <button class="action-btn" onclick="saveResult()">💾 Save</button>
                        <button class="action-btn" onclick="getBoost()">🔄 New</button>
                    </div>
                </div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>

        <div class="related-tools">
            <h3>Related Tools</h3>
            <div class="related-grid">
                <a href="study-planner.html" class="related-card"><span class="icon">📚</span><h4>Study Planner</h4></a>
                <a href="mood-fixer.html" class="related-card"><span class="icon">😊</span><h4>Mood Fixer</h4></a>
                <a href="life-advisor.html" class="related-card"><span class="icon">🧭</span><h4>Life Advisor</h4></a>
            </div>
        </div>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/ai-tools-core.js"></script>
    <script>
        const TOOL_NAME = 'Productivity Boost';
        const SYSTEM_PROMPT = `You are an energetic productivity coach. Give quick, actionable tasks to help someone get started and build momentum. Include a mix of immediate actions (next 5 minutes) and a simple plan. Be encouraging and practical. Use the Pomodoro technique when relevant.`;
        trackToolUsage(TOOL_NAME, window.location.href);

        let situation = '';

        function setSituation(s) {
            situation = s;
            document.querySelectorAll('.quick-option').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        async function getBoost() {
            let message = situation ? `I'm ${situation}.` : 'I need a productivity boost.';
            const task = document.getElementById('taskInput').value.trim();
            if (task) message += ` I need to work on: ${task}`;

            setLoading(true); hideError();
            try {
                const response = await callAI(SYSTEM_PROMPT, message);
                showResult(response);
            } catch (error) { showError('Something went wrong. Please try again.'); }
            finally { setLoading(false); }
        }

        function showResult(text) {
            document.getElementById('resultContent').textContent = text;
            document.getElementById('resultSection').classList.add('show');
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }
        function setLoading(l) {
            document.getElementById('submitBtn').disabled = l;
            document.getElementById('btnText').style.display = l ? 'none' : 'inline';
            document.getElementById('spinner').style.display = l ? 'block' : 'none';
        }
        function showError(m) { const e = document.getElementById('errorMsg'); e.textContent = m; e.classList.add('show'); }
        function hideError() { document.getElementById('errorMsg').classList.remove('show'); }
        function copyResult() { copyToClipboard(document.getElementById('resultContent').textContent); }
        function saveResult() { saveToHistory(TOOL_NAME, situation, document.getElementById('resultContent').textContent); }
    </script>
</body>
</html>
