<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Career Coach - Career Direction Help | Life Solver</title>
    <meta name="description" content="Get personalized career advice and direction. AI-powered career coaching for your professional growth.">
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/brand-components.css">
    <link rel="stylesheet" href="../../css/mini-tool.css">
    <link rel="stylesheet" href="../../css/notifications.css">
</head>
<body>
    <nav class="ls-navbar">
        <div class="ls-container">
            <a href="../../index.html" class="ls-nav-logo"><span>💡</span><span>Life Solver</span></a>
            <div class="ls-nav-links">
                <a href="../../index.html">Home</a>
                <a href="../ai-tools.html">Tools</a>
                <a href="../guides-library.html">Guides</a>
                <a href="../dashboard.html">Dashboard</a>
            </div>
            <button class="ls-mobile-menu" onclick="toggleMobileMenu()">☰</button>
        </div>
    </nav>

    <div class="tool-container">
        <div class="tool-header">
            <span class="tool-icon">💼</span>
            <h1>Mini Career Coach</h1>
            <p>Get personalized career advice and direction</p>
        </div>

        <div class="tool-card">
            <div class="form-group">
                <label>What's your career question?</label>
                <textarea id="userInput" placeholder="E.g., I'm not sure if I should switch careers, I want to negotiate a raise, I'm preparing for an interview..."></textarea>
                <div class="quick-options">
                    <button class="quick-option" onclick="setQuickOption('I want to switch careers but don\'t know where to start')">Career change</button>
                    <button class="quick-option" onclick="setQuickOption('How do I negotiate a higher salary?')">Salary negotiation</button>
                    <button class="quick-option" onclick="setQuickOption('I have an interview coming up, help me prepare')">Interview prep</button>
                    <button class="quick-option" onclick="setQuickOption('I feel stuck in my current job')">Feeling stuck</button>
                </div>
            </div>

            <div class="form-group">
                <label>Your current field (optional)</label>
                <input type="text" id="currentField" placeholder="E.g., Marketing, Engineering, Healthcare...">
            </div>

            <button class="submit-btn" id="submitBtn" onclick="getCareerAdvice()">
                <span id="btnText">💼 Get Career Advice</span>
                <div class="spinner" id="spinner" style="display: none;"></div>
            </button>
            <div class="error-message" id="errorMsg"></div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-card">
                <div class="result-header">
                    <h3>📋 Career Guidance</h3>
                    <div class="result-actions">
                        <button class="action-btn" onclick="copyResult()">📋 Copy</button>
                        <button class="action-btn" onclick="saveResult()">💾 Save</button>
                    </div>
                </div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>

        <div class="related-tools">
            <h3>Related Tools</h3>
            <div class="related-grid">
                <a href="productivity-boost.html" class="related-card"><span class="icon">⚡</span><h4>Productivity Boost</h4></a>
                <a href="life-advisor.html" class="related-card"><span class="icon">🧭</span><h4>Life Advisor</h4></a>
                <a href="money-mentor.html" class="related-card"><span class="icon">💰</span><h4>Money Mentor</h4></a>
            </div>
        </div>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/ai-tools-core.js"></script>
    <script>
        const TOOL_NAME = 'Mini Career Coach';
        const SYSTEM_PROMPT = `You are a supportive career coach. Provide practical, actionable career advice. Be specific with steps and strategies. Include both short-term actions and long-term thinking. Be encouraging but realistic.`;
        trackToolUsage(TOOL_NAME, window.location.href);

        function setQuickOption(text) {
            document.getElementById('userInput').value = text;
            document.querySelectorAll('.quick-option').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        async function getCareerAdvice() {
            const input = document.getElementById('userInput').value.trim();
            const field = document.getElementById('currentField').value.trim();
            if (!input) { showError('Please describe your career question'); return; }

            let message = input;
            if (field) message += ` (Current field: ${field})`;

            setLoading(true); hideError();
            try {
                const response = await callAI(SYSTEM_PROMPT, message);
                showResult(response);
            } catch (error) { showError('Something went wrong. Please try again.'); }
            finally { setLoading(false); }
        }

        function showResult(text) {
            document.getElementById('resultContent').textContent = text;
            document.getElementById('resultSection').classList.add('show');
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }
        function setLoading(l) {
            document.getElementById('submitBtn').disabled = l;
            document.getElementById('btnText').style.display = l ? 'none' : 'inline';
            document.getElementById('spinner').style.display = l ? 'block' : 'none';
        }
        function showError(m) { const e = document.getElementById('errorMsg'); e.textContent = m; e.classList.add('show'); }
        function hideError() { document.getElementById('errorMsg').classList.remove('show'); }
        function copyResult() { copyToClipboard(document.getElementById('resultContent').textContent); }
        function saveResult() { saveToHistory(TOOL_NAME, document.getElementById('userInput').value, document.getElementById('resultContent').textContent); }
    </script>
</body>
</html>
